<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0C0A09"/>
  <g transform="translate(256,250)">
    <defs>
      <!-- Gear shape: outer ring with teeth -->
      <clipPath id="gearClip">
        <circle cx="0" cy="0" r="200"/>
      </clipPath>
    </defs>

    <!-- Gear teeth (12 teeth) -->
    <g fill="#F97316">
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(0)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(30)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(60)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(90)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(120)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(150)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(180)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(210)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(240)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(270)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(300)"/>
      <rect x="-24" y="-210" width="48" height="50" rx="6" transform="rotate(330)"/>
    </g>

    <!-- Gear body (outer circle) -->
    <circle cx="0" cy="0" r="185" fill="#F97316"/>

    <!-- Inner cutout circle (creates the ring) -->
    <circle cx="0" cy="0" r="115" fill="#0C0A09"/>

    <!-- G opening: cut out top-right area to break the ring -->
    <rect x="10" y="-200" width="200" height="120" fill="#0C0A09"/>

    <!-- G horizontal bar -->
    <rect x="-15" y="-20" width="140" height="52" rx="10" fill="#F97316"/>
  </g>
</svg>
