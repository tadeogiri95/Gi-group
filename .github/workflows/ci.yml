name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run test suite
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Subir reporte de coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

      - name: Build (verifica que compile sin errores)
        run: npm run build
        env:
          # Valores ficticios — el build no se conecta a Supabase real, solo
          # compila las rutas. Las credenciales reales viven en Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-placeholder-key
          JWT_SECRET: ci_placeholder_secret_de_32_caracteres_o_mas

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: Smoke test E2E (login → fichar → historial, APIs mockeadas)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-placeholder-key
          JWT_SECRET: ci_placeholder_secret_de_32_caracteres_o_mas

      - name: Subir reporte de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
